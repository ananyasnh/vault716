{% extends 'base.html' %}

{% block title %}Sign In | Vault 716{% endblock %}

{% block content %}
<div class="py-16 sm:py-24 flex items-center justify-center px-4">
    <div class="max-w-md w-full glass-panel rounded-3xl p-8 shadow-2xl relative border border-neutral-900">
        <!-- Decoration -->
        <div class="absolute -bottom-10 -left-10 w-24 h-24 rounded-full bg-amber-500/5 blur-xl"></div>
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-light tracking-[0.2em] text-white uppercase font-display">Welcome Back</h2>
            <p class="mt-2 text-xs uppercase tracking-widest text-amber-500/70">Access Member Dashboard</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <!-- Email Address -->
            <div>
                <label for="email" class="block text-[10px] font-bold uppercase tracking-widest text-neutral-400 mb-2">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com"
                       class="w-full px-4 py-3.5 rounded-xl bg-neutral-950 border border-neutral-800 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 focus:outline-none text-white text-xs placeholder-neutral-700 transition-colors">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-[10px] font-bold uppercase tracking-widest text-neutral-400 mb-2">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                       class="w-full px-4 py-3.5 rounded-xl bg-neutral-950 border border-neutral-800 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 focus:outline-none text-white text-xs placeholder-neutral-700 transition-colors">
            </div>

            <!-- Remember Me Checkbox -->
            <div class="flex items-center">
                <input id="remember_me" name="remember_me" type="checkbox" checked
                       class="h-4 w-4 rounded border-neutral-800 bg-neutral-950 text-amber-500 focus:ring-amber-500 focus:ring-offset-neutral-950">
                <label for="remember_me" class="ml-2.5 text-[10px] font-bold uppercase tracking-widest text-neutral-400 cursor-pointer select-none">Remember Me</label>
            </div>

            <!-- Submit -->
            <div class="pt-2">
                <button type="submit"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl text-xs font-bold uppercase tracking-widest text-neutral-950 bg-amber-500 hover:bg-amber-400 btn-glow transition-all font-display focus:outline-none">
                    Sign In
                </button>
            </div>
        </form>

        <div class="mt-6 text-center text-[10px] text-neutral-500 uppercase tracking-widest">
            New here? 
            <a href="{{ url_for('register') }}" class="text-amber-500 hover:underline">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
